<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verification</title>
  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      width:350px;
      text-align:center;
    }

    .verified{
      color:green;
      font-size:32px;
      font-weight:bold;
    }

    .id{
      margin-top:20px;
      color:#555;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="verified">
    ✅ VERIFIED
  </div>

  <h2>Internship Certificate</h2>

  <p><b>Name:</b> Badal Sen</p>
  <p><b>Course:</b> BCA</p>
  <p><b>Semester:</b> V Semester</p>
  <p><b>Certificate ID:</b> 116668</p>

  <div class="id">
    This certificate is authentic and verified.
  </div>

</div>

</body>
</html>
